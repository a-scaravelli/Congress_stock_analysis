# ==============================================================================
# CONGRESSIONAL COMMITTEE TRADING RULES (TIERED)
# ==============================================================================
# TIER DEFINITIONS:
# 3 (strong): DIRECT JURISDICTION. Committee controls budget/contracts/laws.
# 2 (medium): OVERSIGHT. Committee sets general rules/taxes.
# 1 (low):    TANGENTIAL. General legislative impact only.
#
# CATEGORY DEFINITIONS (higher-level grouping of committees):
# defense_security     — Military budgets, intelligence, arms exports, sanctions
# finance_housing      — Banking regulation, insurance, SEC, housing, REITs
# fiscal_policy        — Tax policy, tariffs, trade, government revenue
# energy_environment   — Energy regulation, EPA, pipelines, mining, utilities
# health_labor         — FDA, drug pricing, hospitals, education, wages
# commerce_technology  — FCC, antitrust, tech regulation, consumer protection
# agriculture          — Farm bill, food supply, CFTC, forestry
# infrastructure       — FAA, highways, railroads, freight
# oversight            — Government waste/fraud investigations
# ==============================================================================

# ==============================================================================
# CATEGORIES — higher-level grouping for condensed analysis
# ==============================================================================
categories:
  defense_security:
    name: "Defense & National Security"
    committees: [HSAS, SSAS, HLIG, SSFR]
  finance_housing:
    name: "Finance, Banking & Housing"
    committees: [HSBA, SSBK]
  fiscal_policy:
    name: "Tax, Trade & Fiscal Policy"
    committees: [HSWM, SSFI]
  energy_environment:
    name: "Energy & Environment"
    committees: [HSIF, SSEG, SSEV]
  health_labor:
    name: "Health, Education & Labor"
    committees: [SSHR, HSED]
  commerce_technology:
    name: "Commerce, Tech & Consumer Protection"
    committees: [SSCM, HSJU]
  agriculture:
    name: "Agriculture & Food"
    committees: [HSAG, SSAF]
  infrastructure:
    name: "Transportation & Infrastructure"
    committees: [HSPW]
  oversight:
    name: "Government Oversight"
    committees: [HSGO]

