      Real Estate: 2
    industries:
      Banks - Diversified: 3            # Fed/SEC rules
      Banks - Regional: 3
      Asset Management: 3
      Capital Markets: 3
      Credit Services: 3
      Mortgage Finance: 3               # Fannie/Freddie oversight
      Financial Data & Stock Exchanges: 3 # SEC/Crypto rules
      REIT - Diversified: 2
      Insurance - Diversified: 2

  HSPW:
    name: "House Transportation & Infrastructure"
