# ==============================================================================
# CONGRESSIONAL COMMITTEE TRADING RULES (TIERED)
# ==============================================================================
# TIER DEFINITIONS:
# 3 (strong): DIRECT JURISDICTION. Committee controls budget/contracts/laws.
# 2 (medium): OVERSIGHT. Committee sets general rules/taxes.
# 1 (low):    TANGENTIAL. General legislative impact only.
# ==============================================================================

committees:

  # --- HOUSE COMMITTEES ---

  HSAS:
    name: "House Armed Services"
    sectors:
      Industrials: 2
      Technology: 1
    industries:
      Aerospace & Defense: 3            # CRITICAL: They authorize NDAA contracts
      Marine Shipping: 3                # Navy shipbuilding
      Uranium: 2                        # Strategic reserves/Nuclear
      Information Technology Services: 1
      Communication Equipment: 1

  HSIF:
    name: "House Energy & Commerce"
    description: "The 'Everything' Committee - huge regulatory power"
    sectors:
      Energy: 3
      Healthcare: 3
      Utilities: 3
      Communication Services: 2
      Technology: 2
      Consumer Defensive: 1
    industries:
      Drug Manufacturers - General: 3    # FDA oversight
      Biotechnology: 3
      Medical Devices: 3
      Healthcare Plans: 3
      Telecom Services: 3                # FCC oversight
      Utilities - Regulated Electric: 3
      Oil & Gas Integrated: 3            # EPA oversight
      Internet Content & Information: 2  # Privacy/Section 230

  HSWM:
    name: "House Ways & Means"
    description: "Tax Policy - affects profitability directly"
    sectors:
      Financial Services: 2
      Healthcare: 2
      Energy: 2
      Consumer Cyclical: 1
    industries:
      Solar: 3                          # Tax Credits (ITC)
      Utilities - Renewable: 3          # Tax Credits (PTC)
      Auto Manufacturers: 2             # EV Tax Credits
      Drug Manufacturers - General: 2   # Tax penalties on pricing

  HSBA:
    name: "House Financial Services"
